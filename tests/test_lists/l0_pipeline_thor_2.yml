# L0 Pipeline Tests - Drive Thor 2 (SM110 Blackwell)
# Focus: FP8 base/KV cache + EAGLE (LLM + VLM) on Blackwell edge
# Model families: Qwen2.5, Qwen3, Qwen3-VL

tests:
  - tests/defs/test_common.py::test_build_project
  - tests/defs/test_common.py::test_unit_tests

  # === Qwen2.5-0.5B FP8 (base FP8 LLM + MMLU accuracy) ===
  - tests/defs/test_llm_pipeline.py::test_engine_build[Qwen2.5-0.5B-Instruct-FP8-fp8-mxsl4096-mxbs4-mxil2048]
  - tests/defs/test_llm_pipeline.py::test_inference[Qwen2.5-0.5B-Instruct-FP8-fp8-mxsl4096-mxbs4-mxil2048-llm_basic]
  - tests/defs/test_llm_pipeline.py::test_inference[Qwen2.5-0.5B-Instruct-FP8-fp8-mxsl4096-mxbs4-mxil2048-mmlu_0-bs4]

  # === Qwen2.5-0.5B FP8 + FP8 KV cache ===
  - tests/defs/test_llm_pipeline.py::test_engine_build[Qwen2.5-0.5B-Instruct-FP8-KV-fp8-fp8kv-mxsl4096-mxbs4-mxil2048]
  - tests/defs/test_llm_pipeline.py::test_inference[Qwen2.5-0.5B-Instruct-FP8-KV-fp8-fp8kv-mxsl4096-mxbs4-mxil2048-llm_basic]

  # === EAGLE LLM - Qwen3-1.7B with EAGLE3 speculative decoding ===
  - tests/defs/test_llm_pipeline.py::test_engine_build[Qwen3-1.7B-nvfp4-mxsl2048-eagle-eagle3-nvfp4-mxbs1-mxil1024]
  - tests/defs/test_llm_pipeline.py::test_inference[Qwen3-1.7B-nvfp4-mxsl2048-eagle-eagle3-nvfp4-mxbs1-mxil1024-llm_basic]

  # === EAGLE VLM - Qwen3-VL-4B with EAGLE3 speculative decoding ===
  - tests/defs/test_vlm_pipeline.py::test_engine_build[Qwen3-VL-4B-Instruct-nvfp4-mxsl8192-eagle-eagle3-nvfp4-mxbs1-mxil8192-mnit128-mxit8192-mxpiit512]
  - tests/defs/test_vlm_pipeline.py::test_inference[Qwen3-VL-4B-Instruct-nvfp4-mxsl8192-eagle-eagle3-nvfp4-mxbs1-mxil8192-mnit128-mxit8192-mxpiit512-vlm_basic]
