# L0 Pipeline Tests - Jedha (SM110 Blackwell, large memory)
# Focus: Larger models, long generation accuracy tests (MMLU 5-shot, MMMU), LoRA, EAGLE VLM
# Model families: Qwen2.5, Qwen3, Qwen3-VL, Nemotron-H, Phi-4 multimodal

tests:
  - tests/defs/test_common.py::test_build_project
  - tests/defs/test_common.py::test_unit_tests

  # === Qwen2.5-0.5B FP8 (full MMLU 5-shot accuracy — longer than 0-shot on Thor) ===
  # mxil4096: MMLU 5-shot prompts can exceed 2048 tokens (up to ~3000)
  - tests/defs/test_llm_pipeline.py::test_engine_build[Qwen2.5-0.5B-Instruct-FP8-fp8-mxsl4096-mxbs4-mxil4096]
  - tests/defs/test_llm_pipeline.py::test_inference[Qwen2.5-0.5B-Instruct-FP8-fp8-mxsl4096-mxbs4-mxil4096-llm_basic]
  - tests/defs/test_llm_pipeline.py::test_inference[Qwen2.5-0.5B-Instruct-FP8-fp8-mxsl4096-mxbs4-mxil4096-mmlu_5-bs4]

  # === Qwen3-1.7B NVFP4 (full MMLU 5-shot accuracy) ===
  # mxil4096: MMLU 5-shot prompts can exceed 2048 tokens (up to ~3000)
  - tests/defs/test_llm_pipeline.py::test_engine_build[Qwen3-1.7B-NVFP4-nvfp4-mxsl4096-mxbs2-mxil4096]
  - tests/defs/test_llm_pipeline.py::test_inference[Qwen3-1.7B-NVFP4-nvfp4-mxsl4096-mxbs2-mxil4096-llm_basic]
  - tests/defs/test_llm_pipeline.py::test_inference[Qwen3-1.7B-NVFP4-nvfp4-mxsl4096-mxbs2-mxil4096-mmlu_5-bs2]

  # === NVIDIA Nemotron 4B NVFP4 (Hybrid Mamba architecture) ===
  - tests/defs/test_llm_pipeline.py::test_engine_build[NVIDIA-Nemotron-3-Nano-4B-NVFP4-nvfp4-mxsl4096-mxbs2-mxil2048]
  - tests/defs/test_llm_pipeline.py::test_inference[NVIDIA-Nemotron-3-Nano-4B-NVFP4-nvfp4-mxsl4096-mxbs2-mxil2048-llm_basic]

  # === Phi-4 multimodal FP8 (Phi-4 VLM architecture + MMMU accuracy) ===
  # mnit256: Phi-4 visual builder requires minImageTokens divisible by 256
  - tests/defs/test_vlm_pipeline.py::test_engine_build[Phi-4-multimodal-instruct-FP8-fp8-mxsl4096-mxbs2-mxil4096-mnit256-mxit4096-mxpiit512]
  - tests/defs/test_vlm_pipeline.py::test_inference[Phi-4-multimodal-instruct-FP8-fp8-mxsl4096-mxbs2-mxil4096-mnit256-mxit4096-mxpiit512-vlm_basic]
  - tests/defs/test_vlm_pipeline.py::test_inference[Phi-4-multimodal-instruct-FP8-fp8-mxsl4096-mxbs2-mxil4096-mnit256-mxit4096-mxpiit512-mmmu-bs2]

  # === Qwen3-VL-4B NVFP4 (full MMMU accuracy) ===
  # mmmu-bs1: MMMU large images cause tensor reshape failures at bs2
  - tests/defs/test_vlm_pipeline.py::test_engine_build[Qwen3-VL-4B-Instruct-NVFP4-nvfp4-mxsl8192-mxbs2-mxil8192-mnit128-mxit8192-mxpiit512]
  - tests/defs/test_vlm_pipeline.py::test_inference[Qwen3-VL-4B-Instruct-NVFP4-nvfp4-mxsl8192-mxbs2-mxil8192-mnit128-mxit8192-mxpiit512-vlm_basic]
  # TODO: Re-enable after baseline stabilizes — auto-saved baseline from first
  # bs1 run triggers flaky 5% regression on subsequent runs (0.49 vs 0.51).
  # - tests/defs/test_vlm_pipeline.py::test_inference[Qwen3-VL-4B-Instruct-NVFP4-nvfp4-mxsl8192-mxbs2-mxil8192-mnit128-mxit8192-mxpiit512-mmmu-bs1]

  # === Qwen3.5-0.8B FP16 (hybrid GDN+attention VLM, basic VLM + text-only) ===
  - tests/defs/test_vlm_pipeline.py::test_engine_build[Qwen3.5-0.8B-fp16-mxsl4096-mxbs2-mxil4096-mnit128-mxit4096-mxpiit512]
  - tests/defs/test_vlm_pipeline.py::test_inference[Qwen3.5-0.8B-fp16-mxsl4096-mxbs2-mxil4096-mnit128-mxit4096-mxpiit512-vlm_basic]

  # === EAGLE VLM - Qwen3-VL-4B with EAGLE3 speculative decoding + full MMMU ===
  - tests/defs/test_vlm_pipeline.py::test_engine_build[Qwen3-VL-4B-Instruct-nvfp4-mxsl8192-eagle-eagle3-nvfp4-mxbs1-mxil8192-mnit128-mxit8192-mxpiit512]
  - tests/defs/test_vlm_pipeline.py::test_inference[Qwen3-VL-4B-Instruct-nvfp4-mxsl8192-eagle-eagle3-nvfp4-mxbs1-mxil8192-mnit128-mxit8192-mxpiit512-vlm_basic]
  - tests/defs/test_vlm_pipeline.py::test_inference[Qwen3-VL-4B-Instruct-nvfp4-mxsl8192-eagle-eagle3-nvfp4-mxbs1-mxil8192-mnit128-mxit8192-mxpiit512-mmmu-bs1]

  # === Experimental Python Server (pybind E2E) ===
  - tests/defs/test_server_pipeline.py::test_build_pybind
  # Low-level pybind runtime tests (LLM + VLM + streaming)
  - tests/defs/test_server_pipeline.py::TestServerPipeline::test_server_inference[Qwen3-1.7B-NVFP4-nvfp4-mxsl4096-mxbs2-mxil4096-llm_basic]
  - tests/defs/test_server_pipeline.py::TestServerPipeline::test_server_inference[Qwen3.5-0.8B-fp16-mxsl4096-mxbs2-mxil4096-mnit128-mxit4096-mxpiit512-vlm_basic]
  - tests/defs/test_server_pipeline.py::TestServerPipeline::test_server_streaming[Qwen3-1.7B-NVFP4-nvfp4-mxsl4096-mxbs2-mxil4096-llm_basic]
  # High-level API tests (LLM.generate + LLM.generate_stream)
  - tests/defs/test_server_pipeline.py::TestHLAPI::test_hlapi_generate[Qwen3-1.7B-NVFP4-nvfp4-mxsl4096-mxbs2-mxil4096-llm_basic]
  - tests/defs/test_server_pipeline.py::TestHLAPI::test_hlapi_generate[Qwen3.5-0.8B-fp16-mxsl4096-mxbs2-mxil4096-mnit128-mxit4096-mxpiit512-vlm_basic]
  - tests/defs/test_server_pipeline.py::TestHLAPI::test_hlapi_streaming[Qwen3-1.7B-NVFP4-nvfp4-mxsl4096-mxbs2-mxil4096-llm_basic]
